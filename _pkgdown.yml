url: https://thecartercenter.github.io/erifunctions

destination: pkgdown_site

template:
  bootstrap: 5
  # Carter Center brand palette (sampled from cartercenter.org): navy #001737 primary,
  # the iconic CC green #00873f for links/accents, navy navbar. Fonts approximate the
  # site's serif-forward editorial look (their Denim/Gothia faces are proprietary).
  bslib:
    primary: "#00873f"       # CC green — links, buttons, active states
    secondary: "#001737"     # CC navy — navbar background
    bg: "#ffffff"
    fg: "#001737"            # navy body text
    base_font: { google: "Source Sans 3" }
    heading_font: { google: "Source Serif 4" }
    code_font: { google: "Source Code Pro" }
  # Render Mermaid diagrams in articles. A raw <div class="mermaid"> in the .Rmd passes
  # through pandoc untouched; this loads Mermaid.js and renders those divs, themed to brand.
  includes:
    after_body: |
      <script type="module">
        import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
        mermaid.initialize({
          startOnLoad: false,
          theme: 'base',
          themeVariables: {
            primaryColor: '#eaeef4',
            primaryTextColor: '#001737',
            primaryBorderColor: '#001737',
            lineColor: '#00873f',
            fontFamily: 'Source Sans 3, system-ui, sans-serif'
          }
        });
        mermaid.run();
      </script>

navbar:
  bg: secondary
  type: dark
  structure:
    left:  [intro, reference, articles, roadmap, news]
    right: [search, github]
  components:
    roadmap:
      text: Roadmap
      href: https://github.com/thecartercenter/erifunctions/blob/main/docs/roadmap.md

