# Built 2026-07-16 against the REAL CMR field codes (#lfdmdi_* prefix), via read-only
# recon (structure/aggregate counts only, no records persisted or shared) against the
# real 202604 submission from Madagascar.

country: mad
disease: lf
data_source: programmatic
data_type: mmdp
version: '1.0'
description: Madagascar lf morbidity management and disability prevention (MMDP),
  'PCMPI FL' sheet of the monthly CMR
language: en
time_grain: annual
temporal:
  year_col: year
  period_col: year
preprocessing:
  - remove_smart_quotes
columns:
  year:
    required: yes
    type: numeric
    aliases:
      - Year
      - YEAR
      - '#lfdmdi_year'
    range:
      - 1990
      - 2035
  region:
    required: no
    type: character
    aliases:
      - Region
      - adm1
      - '#lfdmdi_adm1'
  district:
    required: yes
    type: character
    aliases:
      - District
      - district_name
      - adm2
      - '#lfdmdi_adm2'
    allowed_values:
      - Alaotra Mango-ro
      - Amoron'i Mania
      - Analamanga
      - Analanjirofo
      - Androy
      - Anosy
      - Atsimo- Atsinanana
      - Atsimo Andrefana
      - Atsinanana
      - Betsiboka-Betsiboka
      - Boeny
      - Bongolava
      - Diana
      - Haute Matsiatra
      - Ihorombe
      - Itasy
      - Melaky
      - Menabe
      - Sava
      - Sofia
      - Vatovavy- Fitovinany
  sub_county:
    required: no
    type: character
    aliases:
      - SubCounty
      - sub_county
      - adm3
      - '#lfdmdi_adm3'
  disease_reported:
    required: no
    type: character
    aliases:
      - '#lfdmdi_disease'
  surgery_target:
    required: no
    type: numeric
    aliases:
      - '#lfdmdi_surgeytarget'
    range:
      - 0
      - 50000
  village_target:
    required: no
    type: numeric
    aliases:
      - '#lfdmdi_villagetarget'
    range:
      - 0
      - 5000
  male_managed:
    required: no
    type: numeric
    aliases:
      - '#lfdmdi_male_tot'
    range:
      - 0
      - 500000
  female_managed:
    required: no
    type: numeric
    aliases:
      - '#lfdmdi_fem_tot'
    range:
      - 0
      - 500000
  tot:
    required: yes
    type: numeric
    aliases:
      - Treated
      - people_managed
      - '#lfdmdi_tot'
    range:
      - 0
      - 500000
  households_managed:
    required: no
    type: numeric
    aliases:
      - '#lfdmdi_hh_tot'
    range:
      - 0
      - 500000
  surgeries_done:
    required: no
    type: numeric
    aliases:
      - '#lfdmdi_sx_tot'
    range:
      - 0
      - 50000
  surgeries_achieved_pct:
    required: no
    type: numeric
    aliases:
      - '#lfdmdi_sx_achieved'
    range:
      - 0
      - 2

