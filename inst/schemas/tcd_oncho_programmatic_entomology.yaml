# Built 2026-07-16 against the REAL CMR field codes (#rb_ento_surv_* prefix), via read-only
# recon (structure/aggregate counts only, no records persisted or shared) against the
# real 202606 submission from Chad.
#
# Scoped to the identifier spine only (year/region/district/sub_county), matching
# sdn/ssd's precedent for this sheet shape: monthly-wide survey-result blocks with
# no single annual roll-up column to validate a range against.

country: tcd
disease: oncho
data_source: programmatic
data_type: entomology
version: '1.0'
description: Chad oncho entomology surveys, 'Oncho Enquetes Ento' sheet of the monthly
  CMR
language: en
time_grain: annual
temporal:
  year_col: year
  period_col: year
preprocessing:
  - remove_smart_quotes
columns:
  year:
    required: true
    type: numeric
    aliases:
      - Year
      - YEAR
      - '#rb_ento_surv_year'
    range: [1990, 2035]
  region:
    required: false
    type: character
    aliases:
      - Region
      - adm1
      - '#rb_ento_surv_adm1'
  district:
    required: true
    type: character
    aliases:
      - District
      - district_name
      - adm2
      - '#rb_ento_surv_adm2'
    allowed_values:
      - Baibokoum
      - Bakctchoro
      - Balimba
      - Bebedjia
      - Beboto
      - Bedaya
      - Bedjondo
      - Beinamar
      - Bekourou
      - Bere
      - Bessao
      - Billiam Oursi
      - Binder
      - Biobe Singako
      - Bologo
      - Bouna
      - Dafra
      - Danamadji
      - Dembo
      - Djodo Gassa
      - Doba
      - Donia
      - Fianga
      - Gagal
      - Gore
      - Gounou Gaya
      - Guegou
      - Guelao
      - Guene
      - Kara
      - Kelo
      - Kolon
      - Korbol
      - Koumogo
      - Koumra
      - Koupor
      - Krim-Krim
      - Kyabe
      - Lagon
      - Lame
      - Laokassy
      - Larmanaye
      - Lere
      - Maro
      - Moissala
      - Moundou Centre
      - Moundou Est
      - Moundou Ouest
      - Mouroum Goulaye
      - Pala
      - Peni
      - Pont Carol
      - Sarh
      - Torrock
      - Yamodo
      - Youe
  sub_county:
    required: false
    type: character
    aliases:
      - SubCounty
      - sub_county
      - adm3
      - '#rb_ento_surv_adm3'
  disease_reported:
    required: false
    type: character
    aliases:
      - '#rb_ento_surv_disease'
  otz:
    required: false
    type: character
    aliases:
      - '#rb_ento_surv_otz'

