# Built 2026-07-16 against the REAL CMR field codes (#dmditrnsx_* / #dmditrnpt_* / #entotrn_* / #hgtrn_* / #hwtrn_* / #labtrn_*), via read-only
# recon (structure/aggregate counts only, no records persisted or shared) against the
# real 202605 submission from Ethiopia.
#
# ONE schema covers all training sheets present this period (MMDP (surgery) Training, MMDP (patient) Training, Field Ento Training, Hope Group Leader Training, HW Training, Lab Training) because
# eri_split_cmr() routes all of them to the same disease/data_type combo (rblf/training,
# per ADR-0012's combined training code) -- load_dq_schema() can only resolve one file
# per (country, disease, data_source, data_type). Each ingested sheet only ever has ONE
# prefix present, so aliasing every prefix under one canonical column set works:
# run_dq_checks() resolves whichever alias matches the data actually present.

country: eth
disease: rblf
data_source: programmatic
data_type: training
version: '1.0'
description: Ethiopia RB+LF programme trainings, combined training sheets of the monthly
  CMR
language: en
time_grain: annual
temporal:
  year_col: year
  period_col: year
preprocessing:
  - remove_smart_quotes
columns:
  year:
    required: yes
    type: numeric
    aliases:
      - Year
      - YEAR
      - '#dmditrnsx_year'
      - '#dmditrnpt_year'
      - '#entotrn_year'
      - '#hgtrn_year'
      - '#hwtrn_year'
      - '#labtrn_year'
  region:
    required: no
    type: character
    aliases:
      - Region
      - adm1
      - '#dmditrnsx_adm1'
      - '#dmditrnpt_adm1'
      - '#entotrn_adm1'
      - '#hgtrn_adm1'
      - '#hwtrn_adm1'
      - '#labtrn_adm1'
  district:
    required: yes
    type: character
    aliases:
      - District
      - district_name
      - adm2
      - '#dmditrnsx_adm2'
      - '#dmditrnpt_adm2'
      - '#entotrn_adm2'
      - '#hgtrn_adm2'
      - '#hwtrn_adm2'
      - '#labtrn_adm2'
    allowed_values:
      - Agnua
      - Amhara
      - Ari
      - Awi
      - Bale
      - Basketo SpW
      - Bench Sheko
      - Benishangul Gumz
      - Buno Bedele
      - Central
      - Central Gondar
      - Dawuro
      - East Arsi
      - East Bale
      - East Hararge
      - Gambella
      - Gofa
      - Gurage
      - Hadiya
      - Illubabor
      - Itang SpW
      - Jimma
      - Kaffa
      - Konta Special
      - Liban
      - Metekel
      - Mezheng
      - North Gojam
      - North Shoa
      - Oromia
      - Sheka
      - Somali
      - South
      - South Gondar
      - South Omo
      - South West Shoa
      - South Wollo
      - SWEPR
      - Tambaro SpW
      - West Gojjam
      - West Gondar
      - West Guji
      - West Hararge
      - West Omo
      - Wolayita
      - WTH
      - Yem
  sub_county:
    required: no
    type: character
    aliases:
      - SubCounty
      - sub_county
      - adm3
      - '#dmditrnsx_adm3'
      - '#dmditrnpt_adm3'
      - '#entotrn_adm3'
      - '#hgtrn_adm3'
      - '#hwtrn_adm3'
      - '#labtrn_adm3'
  disease_reported:
    required: no
    type: character
    aliases:
      - '#dmditrnsx_disease'
      - '#dmditrnpt_disease'
      - '#entotrn_disease'
      - '#hgtrn_disease'
      - '#hwtrn_disease'
      - '#labtrn_disease'
  goal:
    required: no
    type: numeric
    aliases:
      - '#dmditrnsx_goal'
      - '#dmditrnpt_goal'
      - '#entotrn_goal'
      - '#hgtrn_goal'
      - '#hwtrn_goal'
      - '#labtrn_goal'
    range:
      - 0
      - 5000
  male_trained:
    required: no
    type: numeric
    aliases:
      - '#dmditrnsx_tot_male'
      - '#dmditrnpt_tot_male'
      - '#entotrn_tot_male'
      - '#hgtrn_tot_male'
      - '#hwtrn_tot_male'
      - '#labtrn_tot_male'
    range:
      - 0
      - 1000
  female_trained:
    required: no
    type: numeric
    aliases:
      - '#dmditrnsx_tot_fem'
      - '#dmditrnpt_tot_fem'
      - '#entotrn_tot_fem'
      - '#hgtrn_tot_fem'
      - '#hwtrn_tot_fem'
      - '#labtrn_tot_fem'
    range:
      - 0
      - 1000
  tot:
    required: yes
    type: numeric
    aliases:
      - Trained
      - '#dmditrnsx_tot'
      - '#dmditrnpt_tot'
      - '#entotrn_tot'
      - '#hgtrn_tot'
      - '#hwtrn_tot'
      - '#labtrn_tot'
    range:
      - 0
      - 1000
  achieved_pct:
    required: no
    type: numeric
    aliases:
      - '#dmditrnsx_achieved'
      - '#dmditrnpt_achieved'
      - '#entotrn_achieved'
      - '#hgtrn_achieved'
      - '#hwtrn_achieved'
      - '#labtrn_achieved'
    range:
      - 0
      - 2

