# Built 2026-07-16 against the REAL CMR field codes (#lfsurv_* prefix), via read-only
# recon (structure/aggregate counts only, no records persisted or shared) against the
# real 202606 submission from Uganda.
#
# Scoped to the identifier spine only (year/region/district/sub_county), matching
# sdn/ssd's precedent for this sheet shape: monthly-wide survey-result blocks with
# no single annual roll-up column to validate a range against.

country: uga
disease: lf
data_source: programmatic
data_type: tas
version: '1.0'
description: Uganda lf tas surveys, 'LF Surveys' sheet of the monthly CMR
language: en
time_grain: annual
temporal:
  year_col: year
  period_col: year
preprocessing:
  - remove_smart_quotes
columns:
  year:
    required: true
    type: numeric
    aliases:
      - Year
      - YEAR
      - '#lfsurv_year'
    range: [1990, 2035]
  region:
    required: false
    type: character
    aliases:
      - Region
      - adm1
      - '#lfsurv_adm1'
  district:
    required: true
    type: character
    aliases:
      - District
      - district_name
      - adm2
      - '#lfsurv_adm2'
    allowed_values:
      - Adjumani
      - Amuru
      - Arua
      - Arua City
      - Bugiri
      - Gulu
      - Gulu City
      - Kamuli
      - Kitgum
      - KOBOKO
      - Lamwo
      - Lira
      - MadI-Okollo
      - Maracha
      - Maracha/Teregago
      - Mayuge
      - MOYO
      - Namayingo
      - Nebbi
      - Nwoya
      - Obongi
      - Omoro
      - Oyam
      - Pader
      - Pakwach
      - Terego
      - YUMBE
      - Zombo
  sub_county:
    required: false
    type: character
    aliases:
      - SubCounty
      - sub_county
      - adm3
      - '#lfsurv_adm3'
  disease_reported:
    required: false
    type: character
    aliases:
      - '#lfsurv_disease'

