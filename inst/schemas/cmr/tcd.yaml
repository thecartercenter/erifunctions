country: chad
country_code: tcd
language: fr
template: french_cmr

sheet_aliases:
  rb_treatment: "Oncho Traitement"
  lf_treatment: "Traitement FL"
  lf_mmdp: "LF MMDP"
  cdd_training: "Formation Distributeurs Comm"
  cs_training: "Formation Superviseurs Comm"
  surveys: "Enquêtes"

# Per-sheet routing (disease from the sheet; data_type = the measure) drives
# eri_split_cmr() -> {country}/{disease}/programmatic/{data_type}/staged/. The
# #field codes are language-neutral, so routing is identical to the English
# templates despite the French sheet names.
sheets:
  "Oncho Traitement":
    field_code_prefix: "#rbtrt_"
    disease: oncho
    data_type: treatment
    required_fields:
      - "#rbtrt_year"
      - "#rbtrt_month"
      - "#rbtrt_adm1"
      - "#rbtrt_adm2"
      - "#rbtrt_target"
      - "#rbtrt_treated"

  "Traitement FL":
    field_code_prefix: "#lftrt_"
    disease: lf
    data_type: treatment
    required_fields:
      - "#lftrt_year"
      - "#lftrt_month"
      - "#lftrt_adm1"
      - "#lftrt_adm2"
      - "#lftrt_target"
      - "#lftrt_treated"

  "LF MMDP":
    field_code_prefix: "#lfmmdp_"
    disease: lf
    data_type: mmdp
    required_fields:
      - "#lfmmdp_year"
      - "#lfmmdp_month"
      - "#lfmmdp_adm1"
      - "#lfmmdp_adm2"
      - "#lfmmdp_hydro_screened"
      - "#lfmmdp_lymph_screened"
      - "#lfmmdp_hydro_treated"
      - "#lfmmdp_lymph_treated"

  "Formation Distributeurs Comm":
    field_code_prefix: "#cddtrn_"
    disease: rblf
    data_type: training
    required_fields:
      - "#cddtrn_year"
      - "#cddtrn_month"
      - "#cddtrn_adm1"
      - "#cddtrn_adm2"
      - "#cddtrn_target"
      - "#cddtrn_trained"

  "Formation Superviseurs Comm":
    field_code_prefix: "#cstrn_"
    disease: rblf
    data_type: training
    required_fields:
      - "#cstrn_year"
      - "#cstrn_month"
      - "#cstrn_adm1"
      - "#cstrn_adm2"
      - "#cstrn_target"
      - "#cstrn_trained"

  "Enquêtes":
    field_code_prefix: "#svy_"
    disease: rblf
    data_type: survey
    required_fields:
      - "#svy_year"
      - "#svy_adm1"
      - "#svy_adm2"
      - "#svy_type"
      - "#svy_examined"
      - "#svy_positive"
