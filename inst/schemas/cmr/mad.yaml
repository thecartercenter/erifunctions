country: madagascar
country_code: mad
language: fr
template: french_cmr

sheet_aliases:
  lf_treatment: "Traitement FL"
  lf_mmdp: "PCMPI FL"
  cdd_training: "Formation Distributeurs"
  cs_training: "Formation SC"
  mmdp_training: "Formation Travailleurs de Sante"
  mmdp_surgery_training: "PCMPI Formation Chirurgie"
  surveys: "Enquêtes FL"

# Per-sheet routing (disease from the sheet; data_type = the measure) drives
# eri_split_cmr() -> {country}/{disease}/programmatic/{data_type}/staged/.
# Madagascar is LF-only (no RB/oncho sheets).
sheets:
  "Traitement FL":
    field_code_prefix: "#lftrt_"
    disease: lf
    data_type: treatment
    required_fields:
      - "#lftrt_year"
      - "#lftrt_month"
      - "#lftrt_adm1"
      - "#lftrt_adm2"
      - "#lftrt_target"
      - "#lftrt_treated"

  "PCMPI FL":
    field_code_prefix: "#lfmmdp_"
    disease: lf
    data_type: mmdp
    required_fields:
      - "#lfmmdp_year"
      - "#lfmmdp_month"
      - "#lfmmdp_adm1"
      - "#lfmmdp_adm2"
      - "#lfmmdp_hydro_screened"
      - "#lfmmdp_lymph_screened"
      - "#lfmmdp_hydro_treated"
      - "#lfmmdp_lymph_treated"

  "Formation Distributeurs":
    field_code_prefix: "#cddtrn_"
    disease: rblf
    data_type: training
    required_fields:
      - "#cddtrn_year"
      - "#cddtrn_month"
      - "#cddtrn_adm1"
      - "#cddtrn_adm2"
      - "#cddtrn_target"
      - "#cddtrn_trained"

  "Formation SC":
    field_code_prefix: "#cstrn_"
    disease: rblf
    data_type: training
    required_fields:
      - "#cstrn_year"
      - "#cstrn_month"
      - "#cstrn_adm1"
      - "#cstrn_adm2"
      - "#cstrn_target"
      - "#cstrn_trained"

  "Formation Travailleurs de Sante":
    field_code_prefix: "#mmdptrn_"
    disease: rblf
    data_type: training
    required_fields:
      - "#mmdptrn_year"
      - "#mmdptrn_month"
      - "#mmdptrn_adm1"
      - "#mmdptrn_adm2"
      - "#mmdptrn_target"
      - "#mmdptrn_trained"

  "PCMPI Formation Chirurgie":
    field_code_prefix: "#mmdptrn_"
    disease: rblf
    data_type: training
    required_fields:
      - "#mmdptrn_year"
      - "#mmdptrn_month"
      - "#mmdptrn_adm1"
      - "#mmdptrn_adm2"
      - "#mmdptrn_target"
      - "#mmdptrn_trained"

  "Enquêtes FL":
    field_code_prefix: "#svy_"
    disease: rblf
    data_type: survey
    required_fields:
      - "#svy_year"
      - "#svy_adm1"
      - "#svy_adm2"
      - "#svy_type"
      - "#svy_examined"
      - "#svy_positive"
