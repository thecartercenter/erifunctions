# Built 2026-07-16 against the REAL CMR field codes (#lftrt_* prefix), via read-only
# recon (structure/aggregate counts only, no records persisted or shared) against the
# real 202606 submission from Chad.

country: tcd
disease: lf
data_source: programmatic
data_type: treatment
version: '1.0'
description: Chad lf MDA coverage, 'Traitement FL' sheet of the monthly CMR
language: en
time_grain: annual
temporal:
  year_col: year
  period_col: treatment_round
preprocessing:
  - remove_smart_quotes
columns:
  year:
    required: true
    type: numeric
    aliases:
      - Year
      - YEAR
      - '#lftrt_year'
    range: [1990, 2035]
  region:
    required: false
    type: character
    aliases:
      - Region
      - adm1
      - '#lftrt_adm1'
  district:
    required: true
    type: character
    aliases:
      - District
      - district_name
      - adm2
      - '#lftrt_adm2'
    allowed_values:
      - Baibokoum
      - Bakctchoro
      - Balimba
      - Bebalem
      - Bebedjia
      - Beboto
      - Bedaya
      - Beinamar
      - Benoye
      - Bere
      - Bessao
      - Billiam Oursi
      - Biobe Singako
      - Bodo
      - Bologo
      - Dafra
      - Danamadji
      - Deressia
      - Doba
      - Donia
      - Donomanga
      - Gore
      - Guelendeng
      - Guidari
      - Kara
      - Katoa
      - Kelo
      - Kolon
      - Korbol
      - Koumogo
      - Koumra
      - Krim-Krim
      - Kyabe
      - Lai
      - Laokassy
      - Larmanaye
      - Maro
      - Moulkou
      - Moundou Centre
      - Moundou Est
      - Moundou Ouest
      - Mouroum Goulaye
      - Ndam
      - Sarh
      - Yamodo
  sub_county:
    required: false
    type: character
    aliases:
      - SubCounty
      - sub_county
      - adm3
      - '#lftrt_adm3'
  disease_reported:
    required: false
    type: character
    aliases:
      - '#lftrt_disease'
  population:
    required: false
    type: numeric
    aliases:
      - Population
      - '#lftrt_pop'
    range: [0, 579158]
  treatment_round:
    required: false
    type: numeric
    aliases:
      - Round
      - MDA_round
      - treatment_round
      - '#lftrt_trtrd'
    range: [0, 10]
  target_pop:
    required: false
    type: numeric
    aliases:
      - TargetPop
      - target_population
      - eligible_pop
      - '#lftrt_trttarget'
    range: [1, 500000]
  village_target:
    required: false
    type: numeric
    aliases:
      - '#lftrt_villagetarget'
    range: [0, 5000]
  male_treated:
    required: false
    type: numeric
    aliases:
      - '#lftrt_male_tot'
    range: [0, 500000]
  female_treated:
    required: false
    type: numeric
    aliases:
      - '#lftrt_fem_tot'
    range: [0, 500000]
  treated:
    required: true
    type: numeric
    aliases:
      - Treated
      - people_treated
      - '#lftrt_tot'
    range: [0, 500000]
  coverage_pct:
    required: false
    type: numeric
    aliases:
      - CoveragePct
      - coverage
      - '#lftrt_coverage'
    range: [0, 150]
consistency:
  implausible_overcoverage:
    lhs: treated
    op: <=
    rhs: target_pop
    message: treated exceeds target_pop (over 100% raw coverage)
  treated_nonneg:
    lhs: treated
    op: '>='
    rhs_value: 0.0
    message: Negative treated count

