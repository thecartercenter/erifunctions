# Built 2026-07-16 against the REAL CMR field codes (#schtrt_* prefix), via read-only
# recon (structure/aggregate counts only, no records persisted or shared) against the
# real 202605 submission from Nigeria.

country: nga
disease: sch
data_source: programmatic
data_type: treatment
version: '1.0'
description: Nigeria sch MDA coverage, 'SCH Treatment' sheet of the monthly CMR
language: en
time_grain: annual
temporal:
  year_col: year
  period_col: treatment_round
preprocessing:
  - remove_smart_quotes
columns:
  year:
    required: true
    type: numeric
    aliases:
      - Year
      - YEAR
      - '#schtrt_year'
    range: [1990, 2035]
  region:
    required: false
    type: character
    aliases:
      - Region
      - adm1
      - '#schtrt_adm1'
  district:
    required: true
    type: character
    aliases:
      - District
      - district_name
      - adm2
      - '#schtrt_adm2'
    allowed_values:
      - Aba North
      - Aba South
      - Abakaliki
      - Afikpo North
      - Afikpo South
      - Akoko-Edo
      - Akwanga
      - Anambra West
      - Anaocha
      - Aninri
      - Aniocha North
      - Aniocha South
      - Awe
      - Awgu
      - Awka South
      - Barkin Ladi
      - Bassa
      - Bende
      - Bomadi
      - Burutu
      - Doma
      - Dunukofia
      - Ebonyi
      - Egor
      - Enugu East
      - Enugu North
      - Enugu South
      - Esan Central
      - Esan North East
      - Esan South East
      - Esan West
      - Ethiope East
      - Ethiope West
      - Etsako Central
      - Etsako East
      - Etsako West
      - Ezza North
      - Ezza South
      - Idimili North
