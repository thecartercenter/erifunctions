      - Ikwo
      - Ikwuano
      - Ishielu
      - Isi-Uzo
      - Isiala-Ngwa South
      - Isiukwuato
      - Isoko North
      - Isoko South
      - Ivo
      - Izzi
      - Jos East
      - Jos North
      - Jos South
      - Kanem
      - Kanke
      - Karu
      - Keana
      - Keffi
      - Kokona
      - Lafia
      - Langtan North
      - Langtan South
      - Mangu
      - Mikang
      - Nasarawa
      - Nasarawa-Eggon
      - Ndokwa East
      - Ndokwa West
      - Njikoka
      - Nkanu East
      - Nkanu West
      - Nnewi South
      - Nsuka
      - Obi
      - Ogbaru
      - Ohafia
      - Ohaozara
      - Ohaukwu
      - Onicha
      - Onitsha South
      - Oredo
      - Orhionmwon
      - Orji-River
      - Orumba North
      - Orumba South
      - Oshimili North
      - Oshimili South
      - Osisioma Ngwa
      - Ovia North East
      - Ovia South West
      - Owan East
      - Owan West
      - Oyi
      - Pankshin
      - Patani
      - Quan'Pam
      - Sapele
      - Shendam
      - Toto
      - Udenu
      - Udi
      - Udu
      - Ughelli North
      - Ughelli South
      - Ukwuani
      - Umu-Nneochi
      - Umuahia North
      - Umuahia South
      - Uvwie
      - Uzo-Uwani
      - Wamba
      - Warri South
      - Warri South West
      - Wase
  sub_county:
    required: false
    type: character
    aliases:
      - SubCounty
      - sub_county
      - adm3
      - '#schtrt_adm3'
  disease_reported:
    required: false
    type: character
    aliases:
      - '#schtrt_disease'
  population:
    required: false
    type: numeric
    aliases:
      - Population
      - '#schtrt_pop'
    range: [0, 500000]
  treatment_round:
    required: false
    type: numeric
    aliases:
      - Round
      - MDA_round
      - treatment_round
      - '#schtrt_trtrd'
    range: [0, 10]
  target_pop:
    required: false
    type: numeric
    aliases:
      - TargetPop
      - target_population
      - eligible_pop
      - '#schtrt_trttarget'
    range: [1, 500000]
  village_target:
    required: false
    type: numeric
    aliases:
      - '#schtrt_villagetarget'
    range: [0, 5000]
  male_treated:
    required: false
    type: numeric
    aliases:
      - '#schtrt_male_tot'
    range: [0, 500000]
  female_treated:
    required: false
    type: numeric
    aliases:
      - '#schtrt_fem_tot'
    range: [0, 500000]
  treated:
    required: true
    type: numeric
    aliases:
      - Treated
      - people_treated
      - '#schtrt_tot'
    range: [0, 500000]
  coverage_pct:
    required: false
    type: numeric
    aliases:
      - CoveragePct
      - coverage
      - '#schtrt_coverage'
    range: [0, 150]
consistency:
  implausible_overcoverage:
    lhs: treated
    op: <=
    rhs: target_pop
    message: treated exceeds target_pop (over 100% raw coverage)
  treated_nonneg:
    lhs: treated
    op: '>='
    rhs_value: 0.0
    message: Negative treated count

