    type: numeric
    aliases:
      - '#vhttrn_achieved'
      - '#pstrn_achieved'
      - '#lltrn_achieved'
      - '#sstrn_achieved'
      - '#dmditrnsx_achieved'
      - '#dmditrnpt_achieved'
      - '#entotrn_achieved'
      - '#labtrn_achieved'
    range:
      - 0
      - 2

