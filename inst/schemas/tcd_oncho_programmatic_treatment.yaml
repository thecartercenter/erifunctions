# Built 2026-07-16 against the REAL CMR field codes (#rbtrt_* prefix), via read-only
# recon (structure/aggregate counts only, no records persisted or shared) against the
# real 202606 submission from Chad.

country: tcd
disease: oncho
data_source: programmatic
data_type: treatment
version: '1.0'
description: Chad oncho MDA coverage, 'Oncho Traitement' sheet of the monthly CMR
language: en
time_grain: annual
temporal:
  year_col: year
  period_col: treatment_round
preprocessing:
  - remove_smart_quotes
columns:
  year:
    required: yes
    type: numeric
    aliases:
      - Year
      - YEAR
      - '#rbtrt_year'
    range:
      - 1990
      - 2035
  region:
    required: no
    type: character
    aliases:
      - Region
      - adm1
      - '#rbtrt_adm1'
  district:
    required: yes
    type: character
    aliases:
      - District
      - district_name
      - adm2
      - '#rbtrt_adm2'
    allowed_values:
      - Baibokoum
      - Bakctchoro
      - Balimba
      - Bebedjia
      - Beboto
      - Bedaya
      - Bedjondo
      - Beinamar
      - Bekourou
      - Bere
      - Bessao
      - Binder
      - Biobe Singako
      - Bologo
      - Bouna
      - Dafra
      - Danamadji
      - Dembo
      - Djodo Gassa
      - Doba
      - Donia
      - Fianga
      - Gagal
      - Gore
      - Gounou Gaya
      - Guegou
      - Guelao
      - Guene
      - Kara
      - Kelo
      - Kolon
      - Korbol
      - Koumogo
      - Koumra
      - Koupor
      - Krim-Krim
      - Kyabe
      - Lagon
      - Lame
      - Laokassy
      - Larmanaye
      - Lere
      - Maro
      - Moissala
      - Moundou Centre
      - Moundou Est
      - Moundou Ouest
      - Mouroum Goulaye
      - Pala
      - Peni
      - Pont Carol
      - Sarh
      - Torrock
      - Yamodo
      - Youe
  sub_county:
    required: no
    type: character
    aliases:
      - SubCounty
      - sub_county
      - adm3
      - '#rbtrt_adm3'
  disease_reported:
    required: no
    type: character
    aliases:
      - '#rbtrt_disease'
  population:
    required: no
    type: numeric
    aliases:
      - Population
      - '#rbtrt_pop'
    range:
      - 0
      - 579158
  treatment_round:
    required: no
    type: numeric
    aliases:
      - Round
      - MDA_round
      - treatment_round
      - '#rbtrt_trtrd'
    range:
      - 0
      - 10
  target_pop:
    required: no
    type: numeric
    aliases:
      - TargetPop
      - target_population
      - eligible_pop
      - '#rbtrt_trttarget'
    range:
      - 1
      - 500000
  village_target:
    required: no
    type: numeric
    aliases:
      - '#rbtrt_villagetarget'
    range:
      - 0
      - 5000
  male_treated:
    required: no
    type: numeric
    aliases:
      - '#rbtrt_male_tot'
    range:
      - 0
      - 500000
  female_treated:
    required: no
    type: numeric
    aliases:
      - '#rbtrt_fem_tot'
    range:
      - 0
      - 500000
  treated:
    required: yes
    type: numeric
    aliases:
      - Treated
      - people_treated
      - '#rbtrt_tot'
    range:
      - 0
      - 500000
  coverage_pct:
    required: no
    type: numeric
    aliases:
      - CoveragePct
      - coverage
      - '#rbtrt_coverage'
    range:
      - 0
      - 150
consistency:
  implausible_overcoverage:
    lhs: treated
    op: <=
    rhs: target_pop
    message: treated exceeds target_pop (over 100% raw coverage)
  treated_nonneg:
    lhs: treated
    op: '>='
    rhs_value: 0.0
    message: Negative treated count

