# Built 2026-07-16 against the REAL CMR field codes (#lftrt_* prefix), via read-only
# recon (structure/aggregate counts only, no records persisted or shared) against the
# real 202604 submission from Madagascar.

country: mad
disease: lf
data_source: programmatic
data_type: treatment
version: '1.0'
description: Madagascar lf MDA coverage, 'Traitement FL' sheet of the monthly CMR
language: en
time_grain: annual
temporal:
  year_col: year
  period_col: treatment_round
preprocessing:
  - remove_smart_quotes
columns:
  year:
    required: true
    type: numeric
    aliases:
      - Year
      - YEAR
      - '#lftrt_year'
    range: [1990, 2035]
  region:
    required: false
    type: character
    aliases:
      - Region
      - adm1
      - '#lftrt_adm1'
  district:
    required: true
    type: character
    aliases:
      - District
      - district_name
      - adm2
      - '#lftrt_adm2'
    allowed_values:
      - Alaotra Mango-ro
      - Amoron'i Mania
      - Analamanga
      - Analanjirofo
      - Anosy
      - Atsimo- Atsinanana
      - Atsimo Andrefana
      - Atsinanana
      - Betsiboka-Betsiboka
      - Boeny
      - Bongolava
      - Diana
      - Haute Matsiatra
      - Ihorombe
      - Itasy
      - Melaky
      - Menabe
      - Sava
      - Sofia
      - Vatovavy- Fitovinany
  sub_county:
    required: false
    type: character
    aliases:
      - SubCounty
      - sub_county
      - adm3
      - '#lftrt_adm3'
  disease_reported:
    required: false
    type: character
    aliases:
      - '#lftrt_disease'
  population:
    required: false
    type: numeric
    aliases:
      - Population
      - '#lftrt_pop'
    range: [0, 1257058]
  treatment_round:
    required: false
    type: numeric
    aliases:
      - Round
      - MDA_round
      - treatment_round
      - '#lftrt_trtrd'
    range: [0, 10]
  target_pop:
    required: false
    type: numeric
    aliases:
      - TargetPop
      - target_population
      - eligible_pop
      - '#lftrt_trttarget'
    range: [1, 500000]
  village_target:
    required: false
    type: numeric
    aliases:
      - '#lftrt_villagetarget'
    range: [0, 5000]
  male_treated:
    required: false
    type: numeric
    aliases:
      - '#lftrt_male_tot'
    range: [0, 564183]
  female_treated:
    required: false
    type: numeric
    aliases:
      - '#lftrt_fem_tot'
    range: [0, 564183]
  treated:
    required: true
    type: numeric
    aliases:
      - Treated
      - people_treated
      - '#lftrt_tot'
    range: [0, 564183]
  coverage_pct:
    required: false
    type: numeric
    aliases:
      - CoveragePct
      - coverage
      - '#lftrt_coverage'
    range: [0, 150]
consistency:
  implausible_overcoverage:
    lhs: treated
    op: <=
    rhs: target_pop
    message: treated exceeds target_pop (over 100% raw coverage)
  treated_nonneg:
    lhs: treated
    op: '>='
    rhs_value: 0.0
    message: Negative treated count

