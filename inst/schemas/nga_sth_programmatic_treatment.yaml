  sub_county:
    required: false
    type: character
    aliases:
      - SubCounty
      - sub_county
      - adm3
      - '#sthtrt_adm3'
  disease_reported:
    required: false
    type: character
    aliases:
      - '#sthtrt_disease'
  population:
    required: false
    type: numeric
    aliases:
      - Population
      - '#sthtrt_pop'
    range: [0, 1389062]
  treatment_round:
    required: false
    type: numeric
    aliases:
      - Round
      - MDA_round
      - treatment_round
      - '#sthtrt_trtrd'
    range: [0, 10]
  target_pop:
    required: false
    type: numeric
    aliases:
      - TargetPop
      - target_population
      - eligible_pop
      - '#sthtrt_trttarget'
    range: [1, 589166]
  village_target:
    required: false
    type: numeric
    aliases:
      - '#sthtrt_villagetarget'
    range: [0, 5000]
  male_treated:
    required: false
    type: numeric
    aliases:
      - '#sthtrt_male_tot'
    range: [0, 500000]
  female_treated:
    required: false
    type: numeric
    aliases:
      - '#sthtrt_fem_tot'
    range: [0, 500000]
  treated:
    required: true
    type: numeric
    aliases:
      - Treated
      - people_treated
      - '#sthtrt_tot'
    range: [0, 500000]
  coverage_pct:
    required: false
    type: numeric
    aliases:
      - CoveragePct
      - coverage
      - '#sthtrt_coverage'
    range: [0, 150]
consistency:
  implausible_overcoverage:
    lhs: treated
    op: <=
    rhs: target_pop
    message: treated exceeds target_pop (over 100% raw coverage)
  treated_nonneg:
    lhs: treated
    op: '>='
    rhs_value: 0.0
    message: Negative treated count

