# Built 2026-07-16 against the REAL CMR field codes (#sthtrt_* prefix), via read-only
# recon (structure/aggregate counts only, no records persisted or shared) against the
# real 202605 submission from Nigeria.

country: nga
disease: sth
data_source: programmatic
data_type: treatment
version: '1.0'
description: Nigeria sth MDA coverage, 'STH Treatment' sheet of the monthly CMR
language: en
time_grain: annual
temporal:
  year_col: year
  period_col: treatment_round
preprocessing:
  - remove_smart_quotes
columns:
  year:
    required: true
    type: numeric
    aliases:
      - Year
      - YEAR
      - '#sthtrt_year'
    range: [1990, 2035]
  region:
    required: false
    type: character
    aliases:
      - Region
      - adm1
      - '#sthtrt_adm1'
  district:
    required: true
    type: character
    aliases:
      - District
      - district_name
      - adm2
      - '#sthtrt_adm2'
