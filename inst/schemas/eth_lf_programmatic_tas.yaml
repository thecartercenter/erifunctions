# Built 2026-07-16 against the REAL CMR field codes (#lfsurv_* prefix), via read-only
# recon (structure/aggregate counts only, no records persisted or shared) against the
# real 202605 submission from Ethiopia.
#
# Scoped to the identifier spine only (year/region/district/sub_county), matching
# sdn/ssd's precedent for this sheet shape: monthly-wide survey-result blocks with
# no single annual roll-up column to validate a range against.

country: eth
disease: lf
data_source: programmatic
data_type: tas
version: '1.0'
description: Ethiopia lf tas surveys, 'LF Surveys' sheet of the monthly CMR
language: en
time_grain: annual
temporal:
  year_col: year
  period_col: year
preprocessing:
  - remove_smart_quotes
columns:
  year:
    required: yes
    type: numeric
    aliases:
      - Year
      - YEAR
      - '#lfsurv_year'
    range:
      - 1990
      - 2035
  region:
    required: no
    type: character
    aliases:
      - Region
      - adm1
      - '#lfsurv_adm1'
  district:
    required: yes
    type: character
    aliases:
      - District
      - district_name
      - adm2
      - '#lfsurv_adm2'
    allowed_values:
      - Agnua
      - Ari
      - Awi
      - Bench Sheko
      - Dawuro
      - Gofa
      - Illubabor
      - Itang SpW
      - Konta Special
      - Metekel
      - Mezheng
      - South Gondar
      - South Omo
      - West Gondar
      - West Omo
      - Yem
  sub_county:
    required: no
    type: character
    aliases:
      - SubCounty
      - sub_county
      - adm3
      - '#lfsurv_adm3'
  disease_reported:
    required: no
    type: character
    aliases:
      - '#lfsurv_disease'

