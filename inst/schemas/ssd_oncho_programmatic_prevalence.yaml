country: ssd
disease: oncho
data_source: programmatic
data_type: prevalence
version: "1.0"
description: "South Sudan onchocerciasis epidemiological surveys, RB Epi Surveys sheet of the monthly CMR"
language: en
time_grain: annual

# Built 2026-07-10 against the REAL CMR field codes (#rb_epi_surv_* prefix), via
# read-only recon against the real May 2026 (202605) submission. See PR #269.
#
# Same shape issue as ssd_lf_programmatic_tas.yaml: dbs/skin_snips/type/notes are
# monthly-only fields (#rb_epi_surv_dbs_jan ... _dec, etc.) with no annual
# roll-up, since a survey happens in whichever month it was fielded. Scoped to
# the identifier spine only; see that file's header note for the fuller
# rationale and what would need to change to validate survey results directly.

temporal:
  year_col: year
  period_col: year

preprocessing:
  - remove_smart_quotes

columns:
  year:
    required: true
    type: numeric
    aliases: [Year, YEAR, "#rb_epi_surv_year"]
    range: [1990, 2035]

  region:
    required: false
    type: character
    aliases: [Region, adm1, "#rb_epi_surv_adm1"]

  district:
    required: true
    type: character
    aliases: [District, district_name, adm2, "#rb_epi_surv_adm2"]
    allowed_values: [Akobo, Aweil Center, Aweil South, Aweil West, Cueibet, Ezo,
      Gogrial East, Gogrial West, Ibba, Juba, Jur River, Maban, "Maban Refugees",
      Magwi, Maridi, Mundri East, Mundri West, Mvolo, Nagero, Nzara, Pibor, Pochalla,
      Raja, Rumbek East, Rumbek North, Tambura, Terekeka, Tonj South, Torit,
      Twic Mayerdit, Wau, Wulu, Yambio, Yirol East, Yirol West]

  sub_county:
    required: false
    type: character
    aliases: [SubCounty, sub_county, adm3, "#rb_epi_surv_adm3"]

  otz:
    required: false
    type: character
    aliases: ["#rb_epi_surv_otz"]

  disease_reported:
    required: false
    type: character
    aliases: ["#rb_epi_surv_disease"]
