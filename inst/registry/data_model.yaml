# Data-addressing model registry (ADR-0012).
#
# The five axes of a canonical path: data/{country}/{disease}/{data_source}/{data_type}/{layer}/
#   - data_source = the channel/nature of the data (how it arrives)
#   - data_type   = the measure (what it captures)
#   - format      = the input shape of a data_source (provenance metadata)
#
# This registry lists the KNOWN values so functions can validate against it. It is
# deliberately extensible: onboarding a new source/measure/format adds an entry here
# (no core-code edit), and an unregistered value *warns* rather than errors, so the
# system never blocks new data â€” it just nudges you to register it.
#
# `countries` and `diseases` are validated the same way, but ALSO normalized:
# eri_data_path()/eri_odk_register() lowercase+trim whatever is passed before
# checking it against these lists, so a path is always built from the canonical
# form here regardless of input casing (ADR-0020 â€” prevents the `LF`/`lf`
# legacy-casing drift found and fixed in #303).

countries:
  dr:       "Dominican Republic"
  ht:       "Haiti"
  eth:      "Ethiopia"
  nga:      "Nigeria"
  sdn:      "Sudan"
  ssd:      "South Sudan"
  uga:      "Uganda"
  mad:      "Madagascar"
  tcd:      "Chad"
  atlantis: "(training sandbox) Synthetic country for teaching/testing; not a real ERI program."

diseases:
  malaria: "Malaria"
  oncho:   "Onchocerciasis (river blindness)"
  lf:      "Lymphatic filariasis"
  sch:     "Schistosomiasis"
  sth:     "Soil-transmitted helminths"
  # Transitional (roadmap Phase 3): combined RB+LF programmatic code from the
  # hsp-mal-era CMR pipeline, retired at the hsp-mal cutover -- not a new-write target.
  rblf:    "(transitional) Combined RB+LF programmatic code; retired at the hsp-mal Phase-3 cutover."

data_sources:
  surveillance: "Direct disease-output feed (e.g. a Ministry-of-Health surveillance system)."
  programmatic: "Programmatic activity/coverage data (country-team CMR, MoH MDA feeds); spans diseases."
  research:     "Research surveys/studies (household or community level); DA-managed, flexible measure."
  # Transitional (ADR-0012 migration): legacy source tokens still resolve so existing
  # paths don't warn. `cmr` -> `programmatic` (format: cmr); `odk` -> `research`
  # (format: odk). New writes use the real channel â€” eri_odk_sync() now writes the
  # `research` source, and eri_split_cmr() writes `programmatic` â€” so these tokens
  # remain only for reading legacy data and are removed at the Phase-3 cutover.
  cmr:          "(transitional, legacy reads only) Old CMR source token; new CMR writes use `programmatic` + format: cmr."
  odk:          "(transitional, legacy reads only) Old ODK source token; new ODK writes use `research` + format: odk."

data_types:
  case:       "Individual case records (one row per patient)."
  aggregate:  "Aggregated counts (one row per place/period)."
  treatment:  "MDA / treatment coverage (target & treated)."
  mmdp:       "Morbidity management & disability prevention (e.g. LF hydrocele/lymphoedema)."
  training:   "Programmatic training activity (CDD / CS / MMDP)."
  survey:     "Programmatic survey (examined / positive)."
  tas:        "Transmission assessment survey (LF)."
  prevalence: "Prevalence survey (e.g. Kato-Katz, skin snip)."
  entomology: "Vector / entomological surveillance (e.g. larval prospection)."

formats:
  cmr:      "Country Monitoring Report Excel template (a programmatic input format)."
  moh_feed: "A direct Ministry-of-Health data feed (a programmatic input format that is not a CMR)."
  odk:      "ODK Central survey instrument (a research collection format)."

layers:
  - raw
  - staged
  - processed
