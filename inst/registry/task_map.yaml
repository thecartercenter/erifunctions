# Task registry (docs-site & guidance-system redesign, phase 3).
#
# One tree: root branches group tasks by what a DA/Epi is trying to do, not by which R/
# source file implements it (that's the reference-index's job, see _pkgdown.yml).
# Leaves are the actual tasks -- each names a representative starting call, the guide
# that walks it end to end (if one exists), and every reference function it touches.
#
# This is the shared source three surfaces render from, so they can never disagree:
#   - a generated static article (vignettes/task-index.Rmd, this phase)
#   - the future eri_guide() console wizard (phase 5)
#   - "next step" epilogues on pipeline functions (phase 6)
# tests/testthat/test-task-map.R checks every reference/guide/call/next value here is
# real -- an unverifiable claim in this file is a test failure, not a stale doc.
#
# Leaf fields:
#   id        unique key, used by `next:` to cross-reference
#   title     task phrased the way a DA/Epi would say it
#   role      da | epi | both
#   call      one representative starting call: real parameter names/order from the
#             function's own signature (optional args may be omitted), with plain
#             placeholder values in place of real data -- illustrative, not
#             copy-paste-exact, but never a fabricated signature
#   guide     a vignettes/*.Rmd slug (optional -- not every task has its own guide)
#   reference exported function names this task touches (checked against NAMESPACE)
#   next      ids of the natural next task(s) (optional)
#   epilogue_after
#             an exported function name from this leaf's own `reference:` list (optional).
#             When set, that function prints a one-line "next step" hint (sourced from
#             `next:`) after it succeeds -- see .eri_task_epilogue() in R/task_registry.R.
#             Only set where a single call is genuinely the unambiguous completion point of
#             the task; most multi-reference leaves have no one true "done" call and are
#             deliberately left unhooked rather than guessing.

- id: get_set_up
  title: "Get set up"
  children:
  - id: connect_services
    title: "Install the package and connect to Azure, ODK, SharePoint, and Teams"
    role: both
    call: 'get_azure_storage_connection()'
    guide: connections-guide
    reference: [get_azure_storage_connection, init_odk_connection, eri_sharepoint_connect, get_teams_connection]
    next: [learn_vocabulary]
  - id: learn_vocabulary
    title: "Learn the data-addressing vocabulary (channel vs. measure)"
    role: both
    call: 'eri_data_model()'
    guide: data-model-card
    reference: [eri_data_model, eri_data_path]
  - id: paced_onboarding
    title: "Follow the paced new-analyst onboarding path"
    role: da
    call: 'eri_data_model()'
    guide: onboarding

- id: bring_data_in
  title: "Bring data into the system"
  children:
  - id: cmr
    title: "A monthly country report (CMR Excel workbook)"
    role: da
    call: 'eri_stage_cmr(country, period)'
    guide: da-cmr-guide
    reference: [eri_stage_cmr, eri_split_cmr, eri_ingest_cmr, eri_cmr_last_plan]
    next: [check_cmr]
    epilogue_after: eri_split_cmr
  - id: surveillance_file
    title: "A surveillance dataset (csv/xlsx from a country)"
    role: da
    call: 'eri_ingest(path, country, disease, data_source, data_type)'
    guide: da-ingest-guide
    reference: [eri_ingest, eri_stage, eri_approve]
    next: [triage_logs]
    epilogue_after: eri_ingest
  - id: odk_submissions
    title: "ODK Central survey submissions"
    role: da
    call: 'eri_odk_sync(project_id, form_id)'
    guide: da-odk-guide
    reference: [eri_odk_register, eri_odk_sync, eri_odk_list_registered, eri_odk_deregister]
    next: [odk_admin]
  - id: odk_admin
    title: "Manage ODK Central users and roles"
    role: da
    call: 'eri_odk_bulk_users(csv_path)'
    reference: [eri_odk_bulk_users, list_all_odk_app_users, update_odk_app_user_role]
  - id: spatial_data
    title: "Admin boundaries or population rasters"
    role: both
    call: 'eri_spatial_load(country, level)'
    guide: spatial-workflow
    reference: [eri_spatial_load, eri_spatial_upload, eri_landscan_upload, eri_landscan_list]
  - id: compare_cutover
    title: "Compare a new pipeline's output against a legacy one before trusting it"
    role: da
    call: 'eri_compare(new, old, by)'
    reference: [eri_compare, eri_inject_anomalies, eri_simulate_check, eri_cutover_check, eri_cutover_status]

- id: check_quality_approve
  title: "Check data quality and approve"
  children:
  - id: check_cmr
    title: "Review and approve a CMR workbook, interactively"
    role: da
    call: 'eri_dq_review(country, period)'
    guide: da-dq-review-guide
    reference: [eri_dq_review, eri_cmr_dq_report, eri_dq_export, eri_approve_cmr]
    next: [triage_logs]
    epilogue_after: eri_approve_cmr
  - id: qc_feedback
    title: "QC a submission and give a country feedback"
    role: da
    call: 'run_dq_checks(data, schema)'
    guide: da-qc-feedback-guide
    reference: [run_dq_checks, eri_dq_export, eri_notify_dq]
  - id: epi_anomalies
    title: "Catch epidemiological anomalies (spikes, gaps) before analysis"
    role: epi
    call: 'add_anomaly_pct_change(data, value_col, period_col, group_cols, year_col)'
    guide: epi-dq-guide
    reference: [add_anomaly_pct_change, add_anomaly_gaps, add_anomaly_consistency, add_anomaly_spatial]
    next: [epi_analytics]
  - id: dq_schema_fix
    title: "Fix or extend a DQ schema (allowed values, ranges)"
    role: both
    call: 'eri_dq_schema_edit(country, disease, data_source, data_type)'
    guide: dq-pipeline
    reference: [eri_dq_schema_edit, eri_dq_schema_status, eri_dq_schema_reset, eri_dq_schema_submit, load_dq_schema]

- id: work_the_backlog
  title: "Work the backlog"
  children:
  - id: triage_logs
    title: "Find and close out failed or DQ log entries"
    role: da
    call: 'eri_logs(country, disease, data_source, data_type)'
    guide: da-logs-guide
    reference: [eri_logs, eri_logs_resolve, eri_dq_flag_resolve, eri_dq_log]
  - id: trace_history
    title: "Reconstruct what happened to a dataset"
    role: da
    call: 'eri_audit(country, disease, data_source, data_type)'
    reference: [eri_audit]
  - id: feedback_tickets
    title: "File or triage internal feedback tickets"
    role: both
    call: 'eri_feedback(message, area)'
    reference: [eri_feedback, eri_feedback_status, eri_feedback_board, eri_feedback_report, eri_feedback_list]
  - id: share_notify
    title: "Share files via SharePoint or post to Teams"
    role: both
    call: 'eri_sharepoint_upload(local_path, site, folder_path)'
    guide: sharepoint-workflow
    reference: [eri_sharepoint_list, eri_sharepoint_read, eri_sharepoint_upload, eri_teams_send]

- id: use_approved_data
  title: "Use approved data: query, analyse, report"
  children:
  - id: adhoc_sql
    title: "Answer an ad-hoc request with SQL"
    role: da
    call: 'eri_query(sql)'
    guide: da-adhoc-guide
    reference: [eri_query, eri_catalog_query]
  - id: catalog_browse
    title: "See what's in the catalog, or rebuild it"
    role: both
    call: 'eri_catalog_query(country, disease)'
    reference: [eri_catalog_query, eri_catalog_register, eri_catalog_verify, eri_catalog_rebuild, eri_catalog_remove]
  - id: branded_outputs
    title: "Turn approved data into on-brand tables, plots, or decks"
    role: da
    call: 'eri_table(data, title)'
    guide: da-reporting-guide
    reference: [eri_table, eri_report_excel, eri_pptx_create, eri_map_choropleth, eri_brand_colors]
  - id: survey_summary
    title: "Summarise an approved survey (e.g. LF TAS)"
    role: da
    call: 'eri_lf_tas_summary(data, fts_col, rdt_col)'
    guide: da-survey-report-guide
    reference: [eri_lf_tas_summary, eri_lf_status_map, eri_lf_pooled_prev, eri_lf_program_levels]
  - id: epi_analytics
    title: "Incidence, epiweeks, and epidemic curves"
    role: epi
    call: 'eri_incidence_rate(cases, pop)'
    guide: epi-analytics
    reference: [eri_incidence_rate, eri_epidemic_curve, eri_epiweek_date, eri_case_summary]

- id: run_research_study
  title: "Run a research study"
  children:
  - id: start_project
    title: "Start or resume a research project"
    role: epi
    call: 'eri_research_init(project_name, country, disease, description)'
    guide: epi-research-guide
    reference: [eri_research_init, eri_research_scaffold, eri_research_resume, eri_research_status]
    next: [track_provenance]
    epilogue_after: eri_research_init
  - id: track_provenance
    title: "Log progress and manage artifacts as you go"
    role: epi
    call: 'eri_research_log(note)'
    reference: [eri_research_log, eri_research_list, eri_artifact_upload, eri_artifact_pull, eri_artifact_list, eri_artifact_archive]
    next: [snapshot_tag]
  - id: snapshot_tag
    title: "Snapshot data and tag a citable, reproducible version"
    role: epi
    call: 'eri_research_tag(label)'
    reference: [eri_research_snapshot, eri_research_tag, eri_research_upload_figure, eri_research_upload_output]
  - id: templates
    title: "Pull or contribute a reusable research template"
    role: epi
    call: 'eri_template_list()'
    reference: [eri_template_list, eri_template_pull, eri_template_upload]

- id: places_and_maps
  title: "Places and maps"
  children:
  - id: reconcile_localities
    title: "Reconcile free-text localities to admin units"
    role: epi
    call: 'eri_spatial_reconcile(data, loc_cols, shapefile, admin_cols)'
    guide: epi-reconcile-guide
    reference: [eri_spatial_reconcile]
    next: [join_map]
    epilogue_after: eri_spatial_reconcile
  - id: join_map
    title: "Join points to admin units and map them"
    role: both
    call: 'eri_spatial_join(data, lat_col, lon_col, shapefile)'
    guide: spatial-workflow
    reference: [eri_spatial_join, eri_map_points, eri_map_inset, eri_map_incidence, eri_bbox_expand]
  - id: population_totals
    title: "Get population totals for an area"
    role: epi
    call: 'eri_spatial_pop(shapefile)'
    reference: [eri_spatial_pop]

- id: add_new_program
  title: "Add a new country, disease, or data type"
  children:
  - id: onboard_surveillance
    title: "Onboard a new surveillance country or disease"
    role: da
    call: 'eri_onboard_country(country_code, country_name, disease)'
    guide: da-onboard-guide
    reference: [eri_onboard_country, eri_onboard_disease, eri_schema_validate]
  - id: onboard_cmr
    title: "Onboard a new CMR-reporting country"
    role: da
    call: 'eri_onboard_cmr(country_code, country_name)'
    guide: da-onboard-guide
    reference: [eri_onboard_cmr]
  - id: contribute_schema
    title: "Contribute a schema or disease analytics to the package"
    role: both
    call: 'eri_schema_validate(schema_path)'
    guide: adding-a-program
